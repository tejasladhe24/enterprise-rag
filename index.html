<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise RAG</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: #555;
        margin-top: 0;
        margin-bottom: 2rem;
      }
      section {
        margin-bottom: 2.5rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid #ddd;
      }
      section:last-of-type {
        border-bottom: none;
      }
      h2 {
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.35rem;
        font-weight: 500;
      }
      input[type="text"],
      input[type="file"] {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 1rem;
        padding: 0.45rem 0.5rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
      }
      .row input[type="text"] {
        flex: 1;
        margin-bottom: 0;
      }
      button {
        padding: 0.5rem 1rem;
        cursor: pointer;
        white-space: nowrap;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 1rem;
        white-space: pre-wrap;
        font-size: 0.9rem;
        color: #333;
      }
      #search-status {
        margin-top: 0.75rem;
        font-size: 0.9rem;
        color: #555;
      }
      #search-results {
        margin-top: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .chunk-card {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        background: #fafafa;
      }
      .chunk-meta {
        font-size: 0.8rem;
        color: #666;
        margin-bottom: 0.5rem;
      }
      .chunk-text {
        margin: 0;
        white-space: pre-wrap;
        font-size: 0.95rem;
      }
      .empty-results {
        color: #666;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>Enterprise RAG</h1>
    <p class="subtitle">Upload documents and search ingested chunks.</p>

    <label for="api-base">API base URL</label>
    <input id="api-base" type="text" value="http://127.0.0.1:8000" required />

    <section>
      <h2>Upload</h2>
      <form id="upload-form">
        <label for="file">File</label>
        <input
          id="file"
          type="file"
          accept=".zip,.pdf,.doc,.docx,.txt,.md"
          required
        />

        <button type="submit" id="submit-btn">Upload</button>
      </form>
      <p id="status"></p>
    </section>

    <section>
      <h2>Search</h2>
      <form id="search-form">
        <label for="search-query">Query</label>
        <div class="row">
          <input
            id="search-query"
            type="text"
            placeholder="e.g. Celery task queue"
            required
          />
          <button type="submit" id="search-btn">Search</button>
        </div>
      </form>
      <p id="search-status"></p>
      <div id="search-results"></div>
    </section>

    <script>
      const uploadForm = document.getElementById("upload-form");
      const searchForm = document.getElementById("search-form");
      const statusEl = document.getElementById("status");
      const searchStatusEl = document.getElementById("search-status");
      const searchResultsEl = document.getElementById("search-results");
      const submitBtn = document.getElementById("submit-btn");
      const searchBtn = document.getElementById("search-btn");

      function getApiBase() {
        return document.getElementById("api-base").value.replace(/\/$/, "");
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function setSearchStatus(message) {
        searchStatusEl.textContent = message;
      }

      function renderSearchResults(chunks) {
        searchResultsEl.innerHTML = "";

        if (!chunks.length) {
          const empty = document.createElement("p");
          empty.className = "empty-results";
          empty.textContent = "No chunks matched your query.";
          searchResultsEl.appendChild(empty);
          return;
        }

        for (const chunk of chunks) {
          const card = document.createElement("article");
          card.className = "chunk-card";

          const meta = document.createElement("div");
          meta.className = "chunk-meta";
          const score =
            chunk.score != null
              ? ` · score ${Number(chunk.score).toFixed(4)}`
              : "";
          meta.textContent = `doc ${chunk.document_id} · chunk #${chunk.chunk_index} · ${chunk.token_count} tokens${score}`;

          const text = document.createElement("p");
          text.className = "chunk-text";
          text.textContent = chunk.text;

          card.append(meta, text);
          searchResultsEl.appendChild(card);
        }
      }

      async function uploadPart(url, blob) {
        const response = await fetch(url, {
          method: "PUT",
          body: blob,
        });
        if (!response.ok) {
          throw new Error(`Part upload failed (${response.status})`);
        }
        const etag = response.headers.get("ETag");
        if (!etag) {
          throw new Error("Missing ETag in part upload response");
        }
        return etag.replaceAll('"', "");
      }

      async function uploadZip(apiBase, file) {
        setStatus("Uploading and extracting zip…");

        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch(`${apiBase}/api/uploads/zip`, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          const detail = await response.text();
          throw new Error(`Zip upload failed: ${detail}`);
        }

        const { files, skipped } = await response.json();
        const uploadedNames = files.map((entry) => entry.filename).join(", ");
        let message = `Uploaded ${files.length} file(s). Ingestion runs in the background.`;

        if (uploadedNames) {
          message += `\nFiles: ${uploadedNames}`;
        }
        if (skipped.length) {
          message += `\nSkipped: ${skipped.join(", ")}`;
        }

        setStatus(message);
      }

      async function uploadSingleFile(apiBase, file) {
        setStatus("Requesting multipart upload URLs…");

        const urlsResponse = await fetch(
          `${apiBase}/api/uploads/multipart/urls`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              filename: file.name,
              file_size: file.size,
              content_type: file.type || "application/octet-stream",
            }),
          },
        );

        if (!urlsResponse.ok) {
          const detail = await urlsResponse.text();
          throw new Error(`Init failed: ${detail}`);
        }

        const { upload_id, key, part_size, parts } = await urlsResponse.json();
        const completedParts = [];

        for (let i = 0; i < parts.length; i++) {
          const { part_number, url } = parts[i];
          const start = (part_number - 1) * part_size;
          const end = Math.min(start + part_size, file.size);
          const chunk = file.slice(start, end);

          setStatus(`Uploading part ${part_number} of ${parts.length}…`);
          const etag = await uploadPart(url, chunk);
          completedParts.push({ part_number, etag });
        }

        setStatus("Completing multipart upload…");
        const completeResponse = await fetch(
          `${apiBase}/api/uploads/multipart/complete`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              upload_id,
              key,
              parts: completedParts,
            }),
          },
        );

        if (!completeResponse.ok) {
          const detail = await completeResponse.text();
          throw new Error(`Complete failed: ${detail}`);
        }

        const result = await completeResponse.json();
        setStatus(
          `Upload complete. Ingestion runs in the background.\nKey: ${result.key}`,
        );
      }

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const apiBase = getApiBase();
        const fileInput = document.getElementById("file");
        const file = fileInput.files[0];
        if (!file) {
          setStatus("Choose a file first.");
          return;
        }

        submitBtn.disabled = true;

        try {
          if (file.name.toLowerCase().endsWith(".zip")) {
            await uploadZip(apiBase, file);
          } else {
            await uploadSingleFile(apiBase, file);
          }
        } catch (error) {
          setStatus(`Error: ${error.message}`);
        } finally {
          submitBtn.disabled = false;
        }
      });

      searchForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const apiBase = getApiBase();
        const query = document.getElementById("search-query").value.trim();
        if (!query) {
          setSearchStatus("Enter a search query.");
          return;
        }

        searchBtn.disabled = true;
        setSearchStatus("Searching…");
        searchResultsEl.innerHTML = "";

        try {
          const response = await fetch(`${apiBase}/api/search`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query }),
          });

          if (!response.ok) {
            const detail = await response.text();
            throw new Error(detail);
          }

          const { chunks } = await response.json();
          setSearchStatus(`${chunks.length} chunk(s) found.`);
          renderSearchResults(chunks);
        } catch (error) {
          setSearchStatus(`Error: ${error.message}`);
          searchResultsEl.innerHTML = "";
        } finally {
          searchBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
